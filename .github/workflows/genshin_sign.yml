name: Genshin Auto Sign

on:
  schedule:
    - cron: '0 18 * * *' # 每天台灣時間凌晨 02:00 自動執行
  workflow_dispatch: # 允許手動點擊執行

jobs:
  hoyolab_sign:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests

      - name: Execute Sign-in
        env:
          HOYOLAB_COOKIE: ${{ secrets.HOYOLAB_COOKIE }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python -c "
          import os
          import requests
          
          cookie = os.environ.get('HOYOLAB_COOKIE')
          webhook = os.environ.get('DISCORD_WEBHOOK')
          
          headers = {
              'Cookie': cookie,
              'Accept': 'application/json, text/plain, */*',
              'Origin': 'https://act.hoyolab.com',
              'Referer': 'https://act.hoyolab.com/',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          }
          
          # 【真正正確】的原神國際服簽到 API 網址，必須包含 /sol/os/sign
          url = 'https://sg-public-api.hoyolab.com/event/sol/os/sign'
          data = {'act_id': 'e202102251931481'}
          
          try:
              res = requests.post(url, headers=headers, json=data)
              try:
                  res_json = res.json()
                  msg = f'【原神自動簽到結果】\n回傳訊息: {res_json.get(\"message\")}\n錯誤代碼: {res_json.get(\"retcode\")}'
              except Exception:
                  msg = f'【原神自動簽到結果】\n解析失敗，伺服器回傳內容:\n{res.text[:200]}'
          except Exception as e:
              msg = f'【原神自動簽到結果】\n網路請求失敗: {str(e)}'
          
          print(msg)
          if webhook:
              requests.post(webhook, json={'content': msg})
          "
