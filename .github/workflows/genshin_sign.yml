name: Genshin Auto Sign

on:
  schedule:
    - cron: '0 18 * * *' # 每天台灣時間凌晨 02:00 自動執行
  workflow_dispatch: # 允許手動點擊執行

jobs:
  hoyolab_sign:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests

      - name: Execute Sign-in
        env:
          HOYOLAB_COOKIE: ${{ secrets.HOYOLAB_COOKIE }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python -c "
          import os
          import requests
          
          # 使用 .strip() 自動剔除 Secrets 裡可能誤貼的隱藏換行或空白
          cookie = os.environ.get('HOYOLAB_COOKIE', '').strip()
          webhook = os.environ.get('DISCORD_WEBHOOK', '').strip()
          
          # 同時具備 Origin、Referer 與關鍵 Client_type 驗證的完整 Header
          headers = {
              'Cookie': cookie,
              'Accept': 'application/json, text/plain, */*',
              'Origin': 'https://act.hoyolab.com',
              'Referer': 'https://act.hoyolab.com/',
              'X-Rpc-Client_type': '5',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          }
          
          # 【終極合體】原神專屬網域 + 正確簽到路徑
          url = 'https://sg-hk4e-api.hoyolab.com/event/sol/sign'
          data = {'act_id': 'e202102251931481'}
          
          try:
              res = requests.post(url, headers=headers, json=data)
              try:
                  res_json = res.json()
                  retcode = res_json.get('retcode')
                  message = res_json.get('message')
                  
                  if retcode == 0:
                      msg = '【原神自動簽到成功】\n🎉 順利蓋章！獎勵已發送到你的遊戲內信箱。'
                  elif retcode == -5003:
                      msg = '【原神自動簽到結果】\n🌟 提示：旅行者，你今天已經手動簽到過囉！'
                  else:
                      msg = f'【原神自動簽到失敗】\n回傳訊息: {message}\n錯誤代碼: {retcode}'
              
              except ValueError:
                  msg = f'【原神自動簽到失敗】\n⚠️ 伺服器拒絕連線 (未回傳正確資料格式)\n狀態碼: {res.status_code}\n原始回應內容: {res.text[:100]}'
                      
          except Exception as e:
              msg = f'【原神自動簽到結果】\n系統網路請求失敗: {str(e)}'
          
          print(msg)
          if webhook:
              requests.post(webhook, json={'content': msg})
          "
